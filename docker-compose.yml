version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: book_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - book_network
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            - APP_ENV=local
            - APP_KEY=${APP_KEY:-base64:defaultkeyfordevonlypleasechange=}
            - DB_CONNECTION=mysql
            - DB_HOST=db
            - DB_PORT=3306
            - DB_DATABASE=${DB_DATABASE:-book_reading}
            - DB_USERNAME=${DB_USERNAME:-book_user}
            - DB_PASSWORD=${DB_PASSWORD:-secret}
            - REDIS_HOST=redis
            - REDIS_PORT=6379

    nginx:
        image: nginx:alpine
        container_name: book_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - book_network
        depends_on:
            - app

    db:
        image: mysql:8.0
        container_name: book_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-book_reading}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
            MYSQL_USER: ${DB_USERNAME:-book_user}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3307:3306"
        networks:
            - book_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: book_redis
        restart: unless-stopped
        ports:
            - "6380:6379"
        networks:
            - book_network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    db_test:
        image: mysql:8.0
        container_name: book_db_test
        environment:
            MYSQL_DATABASE: ${DB_TEST_DATABASE:-book_reading_test}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
            MYSQL_USER: ${DB_USERNAME:-book_user}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
        tmpfs:
            - /var/lib/mysql
        networks:
            - book_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
            interval: 5s
            timeout: 5s
            retries: 10

    redis_test:
        image: redis:7-alpine
        container_name: book_redis_test
        networks:
            - book_network

networks:
    book_network:
        driver: bridge

volumes:
    db_data:
